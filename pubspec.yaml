name: invoice_flow
description: "InvoiceFlow - Professional Invoice Generator Web App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  pdf: ^3.10.8
  printing: ^5.13.1
  hive_flutter: ^1.1.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.0
  fl_chart: ^0.68.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: false
  ios: false
  web:
    generate: true
    image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
